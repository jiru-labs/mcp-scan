name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # `windows-latest` is deliberately absent. Its first run here was also the
        # first time this suite had ever executed on Windows, and it failed: the
        # CLI tests resolve %APPDATA% against the real machine rather than the
        # fixture, and a usage error may exit 2 (our CRITICAL) instead of 64.
        # Issue #45 has the evidence. Windows goes back in the matrix when it is
        # green, not before — a job nobody can trust is worse than no job.
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest -q

      # The config paths differ per platform, so the CLI is worth exercising on
      # each one rather than trusting that importing it was enough.
      - name: Smoke-test the CLI
        run: mcp-config-audit version

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build the distributions
        run: |
          pip install build twine
          python -m build

      - name: Check the package metadata
        run: twine check dist/*
