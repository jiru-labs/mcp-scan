name: Bug report
description: Something the scanner got wrong — a crash, a false positive, a missed risk.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Never paste a real credential.** If a config reproduces the bug, replace
        every key and token with an obvious fake (`sk-FAKE123`) before posting it.
        Anything you put here is public and permanent.

        A flaw in the scanner itself — it printed a credential value, it made a
        network call, it wrote to a file it shouldn't have — is a *security*
        report, not a bug report. Do not file it here; see
        [SECURITY.md](https://github.com/jiru-labs/mcp-config-audit/blob/main/SECURITY.md).

  - type: dropdown
    id: kind
    attributes:
      label: What kind of bug?
      options:
        - It crashed, or the scan didn't complete
        - False positive — it flagged something that is fine
        - False negative — it missed something risky
        - The output or exit code was wrong
        - Something else
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: The config that reproduces it, with the credentials faked
      render: json

  - type: textarea
    id: command
    attributes:
      label: The command you ran, and its output
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: The output of `mcp-config-audit version`.
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: OS and Python version
      placeholder: macOS 15.2, Python 3.12
